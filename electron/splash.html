<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>PEIPL Bill Assistant</title>


    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
      :root {
        --primary: #0d9488;
        --primary-dark: #0f766e;
        --bg: #ffffff;
        --text: #111827;
        --text-muted: #6b7280;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Geist", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        width: 100vw;
        height: 100vh;
        background: transparent;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text);
        -webkit-font-smoothing: antialiased;
        overflow: hidden;
      }

      .splash-card {
        width: 380px;
        height: 220px;
        background: var(--bg);
        border-radius: 20px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
        border: 1px solid rgba(13, 148, 136, 0.1);
        -webkit-app-region: drag;
      }

      .glow {
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(circle at center, rgba(13, 148, 136, 0.05) 0%, transparent 70%);
        pointer-events: none;
        animation: rotate 10s linear infinite;
      }

      @keyframes rotate {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      .icon-container {
        position: relative;
        margin-bottom: 32px;
        animation: scaleIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }

      @keyframes scaleIn {
        from { transform: scale(0.8); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
      }

      .app-icon {
        width: 60px;
        height: 60px;
        background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 8px 20px rgba(13, 148, 136, 0.3);
        position: relative;
        overflow: hidden;
      }

      .app-icon::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.1) 50%, transparent 70%);
        animation: shimmer 2s infinite;
      }

      @keyframes shimmer {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(100%); }
      }

      .icon-text {
        color: white;
        font-size: 18px;
        font-weight: 800;
        letter-spacing: -0.5px;
      }

      .content {
        text-align: center;
        z-index: 1;
      }

      .title {
        font-size: 20px;
        font-weight: 800;
        letter-spacing: -0.02em;
        color: var(--text);
        margin-bottom: 8px;
        animation: slideUp 0.6s ease-out forwards;
        opacity: 0;
      }

      .subtitle {
        font-size: 13px;
        color: var(--text-muted);
        font-weight: 500;
        animation: slideUp 0.6s ease-out 0.2s forwards;
        opacity: 0;
      }

      @keyframes slideUp {
        from { transform: translateY(10px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }

      .loader-container {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 6px;
        background: #f1f5f9;
      }

      .loader-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, var(--primary) 0%, var(--primary-dark) 100%);
        box-shadow: 0 0 10px rgba(13, 148, 136, 0.3);
        animation: progress 3.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      }

      @keyframes progress {
        0% { width: 0%; }
        20% { width: 10%; }
        40% { width: 45%; }
        60% { width: 70%; }
        80% { width: 90%; }
        100% { width: 100%; }
      }

      .version {
        position: absolute;
        bottom: 16px;
        right: 20px;
        font-size: 11px;
        font-weight: 600;
        color: var(--text-muted);
        opacity: 0.6;
        -webkit-app-region: no-drag;
      }
    </style>
  </head>

  <body>
    <div class="splash-card">
      <div class="glow"></div>
      
    

      <div class="content">
        <div class="title">PEIPL Bill Assistant</div>
        <div class="subtitle" id="status">Initializing modules...</div>
      </div>

      <div class="version" id="version">v2.6.0</div>

      <div class="loader-container">
        <div class="loader-bar"></div>
      </div>
    </div>

    <script>
      const statuses = [
        "Initializing modules...",
        "Loading components...",
        "Checking for updates...",
        "Establishing connection...",
        "Preparing workspace...",
        "Launching application..."
      ];
      
      let currentStatus = 0;
      const statusEl = document.getElementById('status');
      
      const updateStatus = () => {
        if (currentStatus < statuses.length - 1) {
          currentStatus++;
          statusEl.style.opacity = 0;
          setTimeout(() => {
            statusEl.textContent = statuses[currentStatus];
            statusEl.style.opacity = 1;
          }, 300);
        }
      };

      setInterval(updateStatus, 500);

      try {
        const v = (typeof process !== "undefined" && process.env && process.env.PEIPL_APP_VERSION) || "2.6.0";
        if (v) {
          document.getElementById("version").textContent = "v" + v;
        }
      } catch {}
    </script>
  </body>
</html>
