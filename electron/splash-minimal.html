<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>PEIPL Bill Assistant</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }
        .splash-card {
            width: 380px;
            height: 220px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .app-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #0d9488 0%, #0f766e 100%);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(13, 148, 136, 0.3);
            margin-bottom: 20px;
        }
        .icon-text {
            color: white;
            font-size: 18px;
            font-weight: 800;
        }
        .title {
            font-size: 20px;
            font-weight: 800;
            color: #111827;
            margin-bottom: 8px;
        }
        .subtitle {
            font-size: 13px;
            color: #6b7280;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="splash-card">
        <div class="app-icon">
            <div class="icon-text">P</div>
        </div>
        <div class="title">PEIPL Bill Assistant</div>
        <div class="subtitle">Initializing...</div>
    </div>
</body>
</html>
