<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>PEIPL Bill Assistant</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0d9488 0%, #0f766e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }
        .splash-content {
            text-align: center;
            color: white;
        }
        .logo {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 24px;
        }
        .title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .status {
            font-size: 14px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="splash-content">
        <div class="logo">PEIPL</div>
        <div class="title">PEIPL Bill Assistant</div>
        <div class="status" id="status">Loading...</div>
    </div>
</body>
</html>
